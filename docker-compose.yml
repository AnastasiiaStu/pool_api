version: "3.9"
services:
  api:
    build: .
    container_name: pool_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://pooluser:poolpass@db:5432/pooldb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    container_name: pool_db
    environment:
      POSTGRES_DB: pooldb
      POSTGRES_USER: pooluser
      POSTGRES_PASSWORD: poolpass
    ports:
      - "5432:5432"
    volumes:
      - pool_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pooluser -d pooldb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pool_pgdata: